# This rule is not used by the project elemental-lifecycle-manager itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to lifecycle.suse.com resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: elemental-lifecycle-manager
    app.kubernetes.io/managed-by: kustomize
  name: release-viewer-role
rules:
- apiGroups:
  - lifecycle.suse.com
  resources:
  - releases
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - lifecycle.suse.com
  resources:
  - releases/status
  verbs:
  - get
