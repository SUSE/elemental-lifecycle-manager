# This rule is not used by the project elemental-lifecycle-manager itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over lifecycle.suse.com.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: elemental-lifecycle-manager
    app.kubernetes.io/managed-by: kustomize
  name: release-admin-role
rules:
- apiGroups:
  - lifecycle.suse.com
  resources:
  - releases
  verbs:
  - '*'
- apiGroups:
  - lifecycle.suse.com
  resources:
  - releases/status
  verbs:
  - get
